 <!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Richie Maps Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1f1f1f;
}

#map{
position:absolute;
top:60px;
bottom:0;
width:100%;
}

.controls{
display:flex;
gap:8px;
}

input{
padding:8px;
border-radius:6px;
border:none;
}

button{
padding:8px;
border:none;
border-radius:6px;
background:#2ecc71;
color:white;
cursor:pointer;
}

.mobilePanel{

position:absolute;
bottom:0;
left:0;
right:0;
background:#222;
padding:10px;
border-top-left-radius:15px;
border-top-right-radius:15px;

}

</style>

</head>

<body>

<header>

<h2>🗺 Richie Maps Pro</h2>

<div class="controls">

<input id="searchBox" placeholder="Search">

<button onclick="searchLocation()">Search</button>

<button onclick="shareLocation()">Share</button>

</div>

</header>

<div id="map"></div>

<div class="mobilePanel">

<button onclick="setTransport('driving')">🚗 Car</button>
<button onclick="setTransport('walking')">🚶 Walk</button>
<button onclick="setTransport('cycling')">🚴 Bike</button>

</div>

<script>

// MAP

const map = new maplibregl.Map({
container:'map',

style:'https://api.maptiler.com/maps/streets/style.json?key=Cgs7eUKoah6PEkf0csoY',

center:[-0.09,51.505],

zoom:14,
pitch:60,
bearing:-17

});

// CONTROLS

map.addControl(new maplibregl.NavigationControl());

map.addControl(new maplibregl.GeolocateControl({
positionOptions:{enableHighAccuracy:true},
trackUserLocation:true
}));


// 3D BUILDINGS

map.on('load',()=>{

map.addLayer({
'id':'3d-buildings',
'source':'openmaptiles',
'source-layer':'building',
'type':'fill-extrusion',

'paint':{

'fill-extrusion-color':'#aaa',

'fill-extrusion-height':[
'interpolate',['linear'],['zoom'],
15,0,
16,20
],

'fill-extrusion-base':['get','min_height'],
'fill-extrusion-opacity':0.6
}

});

});


// SEARCH

async function searchLocation(){

let q=document.getElementById("searchBox").value;

let url=`https://nominatim.openstreetmap.org/search?format=json&q=${q}`;

let res=await fetch(url);
let data=await res.json();

if(data.length){

let lat=data[0].lat;
let lon=data[0].lon;

map.flyTo({center:[lon,lat],zoom:16});

new maplibregl.Marker()
.setLngLat([lon,lat])
.addTo(map);

}

}


// ROUTING

let transport="driving";

function setTransport(type){
transport=type;
}


map.on("contextmenu",async(e)=>{

if(!window.routeStart){

window.routeStart=e.lngLat;

alert("Select destination");

}else{

let start=window.routeStart;
let end=e.lngLat;

let url=`https://router.project-osrm.org/route/v1/${transport}/`
+`${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson`;

let res=await fetch(url);
let data=await res.json();

let coords=data.routes[0].geometry.coordinates;

coords=coords.map(c=>[c[0],c[1]]);

map.addSource('route',{
type:'geojson',
data:{
type:'Feature',
geometry:{
type:'LineString',
coordinates:coords
}
}
});

map.addLayer({
id:'route',
type:'line',
source:'route',
paint:{
'line-color':'#00ffff',
'line-width':5
}
});

window.routeStart=null;

}

});


// SHARE MAP LINK

function shareLocation(){

let center=map.getCenter();
let zoom=map.getZoom();

let url=location.origin+
`?lat=${center.lat}&lon=${center.lng}&zoom=${zoom}`;

navigator.clipboard.writeText(url);

alert("Map link copied!");

}

</script>

</body>
</html>
